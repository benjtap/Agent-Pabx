[general]
static=yes
writeprotect=no

[from-zadarma]
exten => _X.,1,NoOp(Appel entrant recu de Zadarma depuis ${CALLERID(all)})
same => n,Answer()
same => n,Playback(silence/1)
same => n,Set(CALL_UUID=${DEFAULT_UUID()})
same => n,AudioSocket(${CALL_UUID},127.0.0.1:9090)
same => n,Hangup()

[from-internal]
exten => 500,1,NoOp(Appel test entrant depuis le softphone ${CALLERID(all)})
same => n,Answer()
same => n,Playback(silence/1)
same => n,Set(CALL_UUID=${DEFAULT_UUID()})
same => n,AudioSocket(${CALL_UUID},127.0.0.1:9090)
same => n,Hangup()
