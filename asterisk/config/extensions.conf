[general]
static=yes
writeprotect=no

[from-zadarma]
; Quand un appel arrive sur le numéro entrant (ou route par défaut)
exten => _X.,1,NoOp(Appel entrant recu de Zadarma depuis ${CALLERID(all)})
same => n,Answer()
same => n,Playback(silence/1) ; Petite pause pour stabiliser le canal
; Génère un UUID unique pour l'appel et l'envoie via AudioSocket
; On redirige sur l'IP locale (127.0.0.1 ou l'IP host) sur le port 9090 (port Python)
same => n,Set(CALL_UUID=${DEFAULT_UUID()})
; L'adresse '127.0.0.1:9090' correspond au backend IA, network_mode: host partage le trafic réseau.
same => n,AudioSocket(${CALL_UUID},127.0.0.1:9090)
same => n,Hangup()
